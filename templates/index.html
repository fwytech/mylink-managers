{% extends "base.html" %}

{% block extra_css %}
<style>
    .search-and-filter {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin: 2rem 0;
        padding: 0 1rem;
    }

    .search-container {
        flex: 1;
        display: flex;
        gap: 1rem;
    }

    .search-input {
        flex: 1;
        padding: 0.8rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .search-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(var(--primary-color-rgb), 0.1);
    }

    .search-button {
        padding: 0.8rem 1.5rem;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .search-button:hover {
        background-color: var(--primary-color-dark);
    }

    .category-select {
        min-width: 200px;
        padding: 0.8rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        background-color: var(--background-color);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .category-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(var(--primary-color-rgb), 0.1);
    }
    .articles-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
    }

    .article-card {
        background-color: var(--card-background);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .article-card a {
        text-decoration: none;
        color: inherit;
        display: block;
    }

    .article-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        border-color: var(--primary-color);
    }

    .article-cover {
        width: 100%;
        height: 200px;
        object-fit: cover;
        background-color: #f0f0f0;
    }

    .article-content {
        padding: 1.5rem;
    }

    .article-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-color);
    }

    .article-card:hover .article-title {
        color: var(--primary-color);
    }

    .article-platform {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 0.5rem;
    }

    .article-desc {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 1rem;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .article-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.75rem;
        color: #999;
    }

    .loading-spinner {
        display: none;
        justify-content: center;
        margin: 2rem 0;
    }

    .loading-spinner.active {
        display: flex;
    }
</style>
{% endblock %}

{% block content %}
<div class="search-and-filter">
    <div class="search-container">
        <input type="text" class="search-input" placeholder="搜索文章..." id="searchInput">
        <button class="search-button" onclick="searchArticles()">搜索</button>
    </div>
    <div class="filter-container">
        <select class="category-select" id="categorySelect" onchange="filterByCategory(this.value)">
            <option value="">全部分类</option>
            <option value="综合应用">综合应用</option>
            <option value="AIGC应用">AIGC应用</option>
            <option value="AI 智能体">AI 智能体</option>
            <option value="AI应用开发">AI应用开发</option>
            <option value="AI 编程">AI 编程</option>
            <option value="MCP">MCP</option>
            <option value="大模型开发与应用">大模型开发与应用</option>
            <option value="飞书AI">飞书AI</option>
            <option value="AI 工具使用">AI 工具使用</option>
            <option value="RPA智能自动化">RPA智能自动化</option>
            <option value="提示词工程">提示词工程</option>
            <option value="其他-暂未分类">其他-暂未分类</option>
        </select>
    </div>
</div>

<div class="articles-container" id="articlesContainer">
    <!-- 文章卡片将通过JavaScript动态添加 -->
</div>

<div class="loading-spinner" id="loadingSpinner">
    <svg width="50" height="50" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="var(--primary-color)" stroke-width="5" stroke-linecap="round">
            <animateTransform
                attributeName="transform"
                type="rotate"
                dur="1s"
                from="0 25 25"
                to="360 25 25"
                repeatCount="indefinite"/>
        </circle>
    </svg>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
let loading = false;
let currentCategory = '';
let currentSearch = '';

// 初始化页面
document.addEventListener('DOMContentLoaded', () => {
    loadArticles();
    setupInfiniteScroll();
});

// 搜索功能
function searchArticles() {
    currentSearch = document.getElementById('searchInput').value;
    currentPage = 1;
    document.getElementById('articlesContainer').innerHTML = '';
    loadArticles();
}

// 分类筛选
function filterByCategory(category) {
    currentCategory = category;
    currentPage = 1;
    document.getElementById('articlesContainer').innerHTML = '';
    
    // 更新分类标签样式
    document.querySelectorAll('.category-tag').forEach(tag => {
        tag.classList.remove('active');
    });
    if (category) {
        document.querySelector(`[data-category="${category}"]`).classList.add('active');
    }
    
    loadArticles();
}

// 加载文章
async function loadArticles() {
    if (loading) return;
    
    loading = true;
    document.getElementById('loadingSpinner').classList.add('active');
    
    try {
        const params = new URLSearchParams({
            page: currentPage,
            search: currentSearch,
            category: currentCategory
        });
        
        const response = await fetch(`/api/articles?${params}`);
        const data = await response.json();
        
        renderArticles(data.articles);
        
        if (currentPage === 1) {
            // 提取并渲染分类标签
            const categories = [...new Set(data.articles.flatMap(article => 
                article.fields.文章分类 ? article.fields.文章分类.split(',') : []
            ))];
            renderCategories(categories);
        }
        
        currentPage++;
    } catch (error) {
        console.error('加载文章失败:', error);
    } finally {
        loading = false;
        document.getElementById('loadingSpinner').classList.remove('active');
    }
}

// 渲染文章列表
function renderArticles(articles) {
    const container = document.getElementById('articlesContainer');
    
    articles.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card';
        
        card.innerHTML = `
            <a href="${article.fields.文章标题链接 || '#'}" target="_blank">
                <img class="article-cover" src="${article.fields.封面 || '/static/default-cover.jpg'}" alt="文章封面">
                <div class="article-content">
                    <div class="article-title">${article.fields.文章标题 || '无标题'}</div>
                    <div class="article-platform">${article.fields.平台 || '未知平台'}</div>
                    <div class="article-desc">${article.fields.内容简介 || '暂无简介'}</div>
                    <div class="article-meta">
                        <span class="article-category">${article.fields.文章分类 || '未分类'}</span>
                        <span class="article-time">${new Date(article.fields.收集时间).toLocaleDateString()}</span>
                    </div>
            </div>
        `;
        
        container.appendChild(card);
    });
}

// 渲染分类标签
function renderCategories(categories) {
    const container = document.getElementById('categoryFilters');
    container.innerHTML = `
        <span class="category-tag ${!currentCategory ? 'active' : ''}" 
              onclick="filterByCategory('')">全部</span>
    `;
    
    categories.forEach(category => {
        container.innerHTML += `
            <span class="category-tag" 
                  data-category="${category}" 
                  onclick="filterByCategory('${category}')">${category}</span>
        `;
    });
}

// 设置无限滚动
function setupInfiniteScroll() {
    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
            loadArticles();
        }
    });
}
</script>
{% endblock %}
