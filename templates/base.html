<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随手记个人精选知识库</title>
    <style>
        :root {
            --primary-color: #E60012; /* 中国红主题色 */
            --background-color: #F5F5F7; /* 苹果风格背景色 */
            --text-color: #1D1D1F;
            --card-background: #FFFFFF;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: var(--card-background);
            box-shadow: 0 2px 4px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .search-container {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 8px;
            background-color: var(--card-background);
            box-shadow: 0 2px 4px var(--shadow-color);
            font-size: 1rem;
        }

        .search-button {
            padding: 0.8rem 2rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .search-button:hover {
            background-color: #CC0000;
        }

        .category-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .category-tag {
            padding: 0.5rem 1rem;
            background-color: var(--card-background);
            border: 1px solid var(--primary-color);
            border-radius: 20px;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-tag.active {
            background-color: var(--primary-color);
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }

            .search-container {
                flex-direction: column;
            }

            .search-button {
                width: 100%;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 class="site-title">随手记个人精选知识库</h1>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
